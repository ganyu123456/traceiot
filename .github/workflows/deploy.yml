name: Deploy — 部署到云服务器

on:
  # Release 工作流成功后自动触发（main/develop 分支 push 后）
  workflow_run:
    workflows: ["Release — 多架构镜像构建与发布"]
    types: [completed]
    branches: [main, develop]
  # 支持手动触发（方便重新部署）
  workflow_dispatch:

permissions:
  contents: read
  packages: read   # 用于向服务器传递 GHCR 拉取凭证

jobs:
  deploy:
    name: 部署到云服务器
    runs-on: ubuntu-latest
    # workflow_run 触发时，只有前置 Release 工作流成功才继续
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout（获取 docker-compose.yml）
        uses: actions/checkout@v4

      # ── 预先创建目标目录并赋权（SCP 不支持 sudo，需提前建好）──
      - name: 创建部署目录
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sudo mkdir -p /opt/traceiot
            sudo chown -R $USER:$USER /opt/traceiot

      # ── 上传最新 docker-compose.yml 到服务器 ──────────────────
      - name: 上传 docker-compose.yml 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.yml"
          target: /opt/traceiot

      # ── SSH 远程执行部署脚本 ───────────────────────────────────
      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: GHCR_TOKEN,GHCR_USER,REPO_OWNER
          command_timeout: 15m
          script: |
            set -e

            log()  { echo "[$(date '+%H:%M:%S')] $*"; }
            ok()   { echo "[$(date '+%H:%M:%S')] ✓ $*"; }
            info() { echo "[$(date '+%H:%M:%S')] → $*"; }

            # ── 1. 检查 / 安装 Docker ─────────────────────────────
            if command -v docker &>/dev/null; then
              ok "Docker 已安装: $(sudo docker --version)"
            else
              log "正在安装 Docker..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo systemctl enable --now docker
              ok "Docker 安装完成"
            fi

            # ── 2. 检查 / 安装 Docker Compose（有一个即可）──────
            if sudo docker compose version &>/dev/null 2>&1; then
              ok "Docker Compose 插件已安装: $(sudo docker compose version)"
              COMPOSE_CMD="sudo docker compose"
            elif command -v docker-compose &>/dev/null; then
              ok "docker-compose 已安装: $(sudo docker-compose --version)"
              COMPOSE_CMD="sudo docker-compose"
            else
              log "正在安装 Docker Compose 插件..."
              if command -v apt-get &>/dev/null; then
                sudo apt-get update -qq
                sudo apt-get install -y docker-compose-plugin
              else
                # 兜底：直接下载独立二进制
                COMPOSE_VER=$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
                  | grep '"tag_name"' | cut -d'"' -f4)
                sudo curl -fsSL -o /usr/local/bin/docker-compose \
                  "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-$(uname -s)-$(uname -m)"
                sudo chmod +x /usr/local/bin/docker-compose
                COMPOSE_CMD="sudo docker-compose"
              fi
              # apt 安装后优先用插件
              if sudo docker compose version &>/dev/null 2>&1; then
                COMPOSE_CMD="sudo docker compose"
              fi
              ok "Docker Compose 安装完成: $COMPOSE_CMD"
            fi

            # ── 3. 登录 GHCR（拉取私有/公共镜像）────────────────
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin
            ok "已登录 GHCR"

            # ── 4. 配置部署参数 ───────────────────────────────────
            COMPOSE_FILE="/opt/traceiot/docker-compose.yml"

            # 写入 .env 文件，docker compose 自动读取（sudo 不继承环境变量，用 .env 最可靠）
            cat > /opt/traceiot/.env << EOF
GITHUB_REPOSITORY_OWNER=${REPO_OWNER}
TAG=latest
EOF

            # ── 5. 判断是首次部署还是更新 ────────────────────────
            RUNNING_COUNT=$(sudo docker ps --filter "name=traceiot" --format "{{.Names}}" 2>/dev/null | wc -l)

            if [ "$RUNNING_COUNT" -gt 0 ]; then
              info "检测到 ${RUNNING_COUNT} 个 traceiot 容器正在运行，执行滚动更新..."
              $COMPOSE_CMD -f "$COMPOSE_FILE" pull
              $COMPOSE_CMD -f "$COMPOSE_FILE" up -d --remove-orphans
              ok "滚动更新完成"
            else
              info "首次部署，拉取镜像并启动所有服务..."
              $COMPOSE_CMD -f "$COMPOSE_FILE" pull
              $COMPOSE_CMD -f "$COMPOSE_FILE" up -d
              ok "首次部署完成"
            fi

            # ── 6. 等待并输出状态 ────────────────────────────────
            log "等待服务就绪 (20s)..."
            sleep 20
            $COMPOSE_CMD -f "$COMPOSE_FILE" ps

            log "─────────────────────────────────────"
            log "部署成功！访问地址："
            log "  前端：    http://${{ secrets.SERVER_HOST }}"
            log "  后端 API：http://${{ secrets.SERVER_HOST }}:5000"
            log "  EMQX：    http://${{ secrets.SERVER_HOST }}:18083"
            log "─────────────────────────────────────"
